<head>

<title>RoadCoin</title>

<meta property="og:title" content="RoadCoin"><meta property="og:description" content="Compute credits for the BlackRoad mesh."><meta property="og:url" content="https://roadcoin.io"><meta property="og:image" content="https://images.blackroad.io/brand/blackroad-og.png">
<link rel="canonical" href="https://roadcoin.io">
<style>*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
:root{--g:linear-gradient(90deg,#FF6B2B,#FF2255,#CC00AA,#8844FF,#4488FF,#00D4FF);--g135:linear-gradient(135deg,#FF6B2B,#FF2255,#CC00AA,#8844FF,#4488FF,#00D4FF);--bg:#000;--white:#fff;--black:#000;--border:#1a1a1a;--muted:#444;--sub:#737373;--sg:'Space Grotesk',sans-serif;--jb:'JetBrains Mono',monospace}
body{background:var(--bg);color:var(--white);font-family:var(--sg);overflow-x:hidden}
.grad-bar{height:4px;background:var(--g)}
nav{display:flex;align-items:center;justify-content:space-between;padding:16px 48px;border-bottom:1px solid var(--border)}
.nav-logo{font-weight:700;font-size:20px;color:var(--white);display:flex;align-items:center;gap:10px}
.nav-mark{width:28px;height:4px;border-radius:2px;background:var(--g)}
.nav-links{display:flex;gap:24px}
.nav-links a{font-size:13px;font-weight:500;color:var(--white);opacity:.4;text-decoration:none;transition:opacity .15s}
.nav-links a:hover{opacity:.8}
.container{max-width:900px;margin:0 auto;padding:32px 24px}
h1{font-size:32px;font-weight:700;margin-bottom:8px}
.sub{font-size:14px;color:var(--sub);margin-bottom:32px}
.card{border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px;background:#0a0a0a;transition:border-color .2s}
.card:hover{border-color:#333}
.card h3{font-size:16px;font-weight:600;margin-bottom:8px}
.card p{font-size:13px;color:var(--sub);line-height:1.6}
.input{width:100%;padding:12px 14px;background:#111;border:1px solid var(--border);border-radius:6px;color:#f5f5f5;font-size:14px;font-family:var(--sg);outline:none}
.input:focus{border-color:#333}
.btn{padding:10px 24px;border:none;border-radius:6px;background:#f5f5f5;color:#000;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sg)}
.btn-outline{background:transparent;color:#f5f5f5;border:1px solid var(--border)}
.stat{text-align:center;padding:16px}
.stat-val{font-size:28px;font-weight:700}
.stat-label{font-family:var(--jb);font-size:10px;color:var(--sub);letter-spacing:.08em;text-transform:uppercase;margin-top:4px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:24px}
.mono{font-family:var(--jb);font-size:12px}
.label{font-family:var(--jb);font-size:10px;color:var(--sub);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
.dot-up{background:var(--g135)}
.dot-down{background:none;border:1px solid var(--white);opacity:.3}
canvas{border:1px solid var(--border);border-radius:10px;background:#0a0a0a}
footer{border-top:1px solid var(--border);padding:24px 48px;text-align:center;font-size:12px;color:var(--sub)}
footer a{color:var(--white);opacity:.5;text-decoration:none}
.grad-bar-bottom{height:4px;background:var(--g)}
pre{background:#0a0a0a;border:1px solid var(--border);border-radius:8px;padding:16px;font-family:var(--jb);font-size:12px;color:#888;overflow-x:auto;line-height:1.6}
@media(max-width:768px){nav{padding:14px 20px}.container{padding:24px 16px}.grid-4,.grid-3{grid-template-columns:repeat(2,1fr)}.grid-2{grid-template-columns:1fr}h1{font-size:24px}}</style>
</head>
<body>
<div class="grad-bar"></div>
<nav><div class="nav-logo"><div class="nav-mark"></div> RoadCoin</div><div class="nav-links"><a href="https://blackroad.io">Home</a><a href="https://chat.blackroad.io">Chat</a><a href="https://search.blackroad.io">Search</a></div></nav>
<div class="container"><h1>RoadCoin</h1><p class="sub">Compute credits for the sovereign mesh.</p><div class="grid-3"><div class="card" style="text-align:center"><div class="stat-val" id="bal">100</div><div class="stat-label">Balance</div></div><div class="card" style="text-align:center"><div class="stat-val" id="ear">0</div><div class="stat-label">Earned</div></div><div class="card" style="text-align:center"><div class="stat-val" id="snt">0</div><div class="stat-label">Sent</div></div></div><div class="card"><div class="label">Mine Credits</div><p style="font-size:13px;color:#666;margin-bottom:12px">SHA-256 hashing. 1 credit per 1,000 hashes.</p><button class="btn" id="mb" onclick="tm()">Start Mining</button><div id="ms" style="display:none;margin-top:12px;font-size:12px;color:#888">Rate: <b id="hr">0</b>/s | Total: <b id="hc">0</b></div></div><div class="card"><div class="label">Send Credits</div><div style="display:flex;gap:8px"><input class="input" id="sto" placeholder="Recipient" style="flex:1"><input class="input" id="sam" placeholder="Amount" type="number" style="width:100px"><button class="btn" onclick="sc()">Send</button></div></div><div style="text-align:center;margin:24px 0"><a href="https://buy.stripe.com/6oUfZae7CbK56Kv6Ec4Vy0v" class="btn">Buy with Stripe</a></div><div class="label">Transactions</div><div id="tx"></div></div><script>var w=JSON.parse(localStorage.getItem("br-w")||'{"b":100,"e":0,"s":0,"t":[]}'),mi=false,hs=0,ht=0;function sv(){localStorage.setItem("br-w",JSON.stringify(w));rr()}function rr(){document.getElementById("bal").textContent=w.b;document.getElementById("ear").textContent=w.e;document.getElementById("snt").textContent=w.s;document.getElementById("tx").innerHTML=w.t.slice().reverse().slice(0,20).map(function(x){return'<div class="card" style="padding:12px"><div style="display:flex;justify-content:space-between"><span style="font-size:13px">'+(x.y==="e"?"Mined":"Sent to "+x.to)+"</span><span class=\"mono\">"+(x.y==="e"?"+":"-")+x.a+"</span></div></div>"}).join("")||'<div style="text-align:center;color:#555;padding:16px;font-size:13px">No transactions</div>'}function tm(){mi=!mi;document.getElementById("mb").textContent=mi?"Stop":"Start Mining";document.getElementById("ms").style.display=mi?"block":"none";if(mi){hs=0;ht=Date.now();mn()}}async function mn(){if(!mi)return;for(var i=0;i<100;i++){await crypto.subtle.digest("SHA-256",new TextEncoder().encode(Math.random()+""+i));hs++}if(hs%1000===0){w.b++;w.e++;w.t.push({y:"e",a:1,ts:Date.now()});sv()}document.getElementById("hr").textContent=Math.round(hs/((Date.now()-ht)/1000));document.getElementById("hc").textContent=hs;requestAnimationFrame(mn)}function sc(){var to=document.getElementById("sto").value,a=parseInt(document.getElementById("sam").value);if(!to||!a||a<1||a>w.b)return;w.b-=a;w.s+=a;w.t.push({y:"s",to:to,a:a,ts:Date.now()});document.getElementById("sto").value="";document.getElementById("sam").value="";sv()}rr()</script>
