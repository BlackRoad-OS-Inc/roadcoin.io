name: Pi Fleet Sync
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-fleet:
    runs-on: [self-hosted, linux, ARM64]
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Gematria
        run: |
          rsync -avz --delete web/public/ gematria:/var/www/${{ github.event.repository.name }}/ 2>/dev/null || echo "rsync to gematria skipped"
      - name: Deploy to Anastasia
        run: |
          rsync -avz --delete web/public/ anastasia:/srv/domains/${{ github.event.repository.name }}/ 2>/dev/null || echo "rsync to anastasia skipped"
